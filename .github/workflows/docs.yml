name: Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-swagger-ui-tag

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --exclude 'https://api.fjordexpense.example.com/.*'
            --exclude 'https://sandbox.fjordexpense.example.com/.*'
            --exclude 'mailto:.*@fjordexpense.example.com'
            --accept 200,204,429
            'docs/**/*.md'
          fail: true

      - name: Install Vale
        run: |
          wget https://github.com/errata-ai/vale/releases/download/v3.0.7/vale_3.0.7_Linux_64-bit.tar.gz
          tar -xvzf vale_3.0.7_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/

      - name: Download Vale styles
        run: vale sync

      - name: Run Vale
        run: vale --minAlertLevel=error docs/

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mkdocs gh-deploy --force